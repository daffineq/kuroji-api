services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_kuroji
    restart: always
    environment:
      POSTGRES_USER: drizzle
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kuroji
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: redis_kuroji
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
