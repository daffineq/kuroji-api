type Query {
  media(id: Int!): Media
  media_page(
    page: Int = 1
    per_page: Int = 20
    search: String
    id: Int
    id_in: [Int!]
    id_not: Int
    id_not_in: [Int!]
    id_mal: Int
    id_mal_in: [Int!]
    id_mal_not: Int
    id_mal_not_in: [Int!]
    season: MediaSeason
    season_year: Int
    season_year_greater: Int
    season_year_lesser: Int
    format: MediaFormat
    format_in: [MediaFormat!]
    format_not_in: [MediaFormat!]
    status: MediaStatus
    status_in: [MediaStatus!]
    status_not_in: [MediaStatus!]
    type: MediaType
    source: MediaSource
    source_in: [MediaSource!]
    country: CountryCode
    is_licensed: Boolean
    is_adult: Boolean
    air_week: Int
    air_week_in: [Int!]
    air_week_not_in: [Int!]
    age_rating: String
    age_rating_in: [String!]
    age_rating_not_in: [String!]
    genres: String
    genres_in: [String!]
    genres_not_in: [String!]
    tags: String
    tags_in: [String!]
    tags_not_in: [String!]
    studios: String
    studios_in: [String!]
    studios_not_in: [String!]
    studio_is_main: Boolean
    score_greater: Int
    score_lesser: Int
    popularity_greater: Int
    popularity_lesser: Int
    episodes_greater: Int
    episodes_lesser: Int
    duration_greater: Int
    duration_lesser: Int
    start_date_greater: String
    start_date_lesser: String
    end_date_greater: String
    end_date_lesser: String
    start_date_like: String
    end_date_like: String
    airing_at_greater: Int
    airing_at_lesser: Int
    has_next_episode: Boolean
    franchise: String
    views_total_greater: Int
    views_total_lesser: Int
    views_hour_greater: Int
    views_hour_lesser: Int
    views_today_greater: Int
    views_today_lesser: Int
    views_week_greater: Int
    views_week_lesser: Int
    views_month_greater: Int
    views_month_lesser: Int
    sort: [MediaSort!]
  ): MediaPage!
  genres: [MediaGenre!]!
  tags(search: String, category: String, is_adult: Boolean): [MediaTag!]!
  studios(search: String): [MediaStudio!]!
}

type MediaPage {
  data: [Media!]!
  page_info: PageInfo!
}

type PageInfo {
  total: Int!
  per_page: Int!
  current_page: Int!
  last_page: Int!
  has_next_page: Boolean!
}

enum MediaSort {
  # ID Sorting
  ID_DESC
  ID_ASC

  # Title Sorting
  TITLE_ROMAJI
  TITLE_ROMAJI_DESC
  TITLE_ENGLISH
  TITLE_ENGLISH_DESC
  TITLE_NATIVE
  TITLE_NATIVE_DESC

  # Score & Stats Sorting
  SCORE_DESC
  SCORE_ASC
  POPULARITY_DESC
  POPULARITY_ASC
  TRENDING_DESC
  TRENDING_ASC
  CONTAINER_DESC
  FAVORITES_DESC
  FAVORITES_ASC

  # Date Sorting
  START_DATE_DESC
  START_DATE_ASC
  END_DATE_DESC
  END_DATE_ASC
  UPDATED_AT_DESC
  UPDATED_AT_ASC
  AIR_WEEK_DESC
  AIR_WEEK_ASC

  # Episode Sorting
  EPISODES_DESC
  EPISODES_ASC
  DURATION_DESC
  DURATION_ASC
  LATEST_EPISODE_DESC
  LATEST_EPISODE_ASC
  NEXT_EPISODE_DESC
  NEXT_EPISODE_ASC
  LAST_EPISODE_DESC
  LAST_EPISODE_ASC

  # Season Sorting
  SEASON_YEAR_DESC
  SEASON_YEAR_ASC

  # Format & Type
  FORMAT_ASC
  FORMAT_DESC
  TYPE_ASC
  TYPE_DESC

  # Status
  STATUS_ASC
  STATUS_DESC

  # Views
  VIEWS_TOTAL_DESC
  VIEWS_TOTAL_ASC
  VIEWS_HOUR_DESC
  VIEWS_HOUR_ASC
  VIEWS_TODAY_DESC
  VIEWS_TODAY_ASC
  VIEWS_WEEK_DESC
  VIEWS_WEEK_ASC
  VIEWS_MONTH_DESC
  VIEWS_MONTH_ASC

  # Search
  SEARCH_DESC
  SEARCH_ASC
}

enum MediaType {
  ANIME
  MANGA
}

enum MediaFormat {
  TV
  TV_SHORT
  MOVIE
  SPECIAL
  OVA
  ONAS
  MUSIC
  MANGA
  NOVEL
  ONE_SHOT
}

enum MediaStatus {
  FINISHED
  RELEASING
  NOT_YET_RELEASED
  CANCELLED
  HIATUS
}

enum MediaSeason {
  WINTER
  SPRING
  SUMMER
  FALL
}

enum MediaSource {
  ORIGINAL
  MANGA
  LIGHT_NOVEL
  VISUAL_NOVEL
  VIDEO_GAME
  OTHER
