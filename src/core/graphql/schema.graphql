enum ExternalLinkType {
  INFO
  STREAMING
  SOCIAL
}

scalar CountryCode

type Media {
  id: Int!
  id_mal: Int
  title: MediaTitle
  poster: MediaPoster
  background: String
  synonyms: [String!]!
  description: String
  status: MediaStatus
  type: MediaType
  format: MediaFormat
  updated_at: Int!
  start_date: MediaDate
  end_date: MediaDate
  season: MediaSeason
  season_year: Int
  episodes_aired: Int
  episodes_total: Int
  duration: Int
  country: CountryCode
  is_licensed: Boolean
  source: MediaSource
  hashtag: String
  is_adult: Boolean
  score: Int
  popularity: Int
  trending: Int
  favorites: Int
  local_favorites: Int
  color: String
  franchise: String
  more_info: String
  air_week: Int
  broadcast: MediaBroadcast
  age_rating: MediaAgeRating
  genres: [MediaGenre!]!
  airing_schedule: [AiringSchedule!]!
  latest_airing_episode: AiringSchedule
  next_airing_episode: AiringSchedule
  last_airing_episode: AiringSchedule
  characters: [CharacterConnection!]!
  studios(only_main: Boolean): [StudioConnection!]!
  tags: [TagConnection!]!
  score_distribution: [ScoreDistribution!]!
  status_distribution: [StatusDistribution!]!
  local_score_distribution: [LocalScoreDistribution!]!
  local_status_distribution: [LocalStatusDistribution!]!
  links(type: String, label: String): [MediaLink!]!
  alt_titles(source: String, language: String): [AltTitle!]!
  alt_descriptions(source: String, language: String): [AltDescription!]!
  images(source: String, type: String): [MediaImage!]!
  videos(source: String, type: String): [MediaVideo!]!
  screenshots(source: String, order_greater: Int, order_lesser: Int): [MediaScreenshot!]!
  episodes(number_greater: Int, number_lesser: Int, air_date_greater: String, air_date_lesser: String): [Episode!]!
  artworks(iso_639_1: String, source: String, include_adult: Boolean, type: String): [MediaArtwork!]!
  translations(iso_639_1: String, source: String): [MediaTranslation!]!
  chronology: [Media!]!
  recommendations: [Media!]!
  recommendations_ai: [Media!]!
  connected: [Media!]!
  relations: [MediaRelation!]!
}

