type AnimePage {
  data: [Anime!]!
  page_info: PageInfo!
}

type PageInfo {
  total: Int!
  per_page: Int!
  current_page: Int!
  last_page: Int!
  has_next_page: Boolean!
}

enum AnimeSort {
  # ID Sorting
  ID_DESC
  ID_ASC

  # Title Sorting
  TITLE_ROMAJI
  TITLE_ROMAJI_DESC
  TITLE_ENGLISH
  TITLE_ENGLISH_DESC
  TITLE_NATIVE
  TITLE_NATIVE_DESC

  # Score & Stats Sorting
  SCORE_DESC
  SCORE_ASC
  POPULARITY_DESC
  POPULARITY_ASC
  TRENDING_DESC
  TRENDING_ASC
  FAVORITES_DESC
  FAVORITES_ASC

  # Date Sorting
  START_DATE_DESC
  START_DATE_ASC
  END_DATE_DESC
  END_DATE_ASC
  UPDATED_AT_DESC
  UPDATED_AT_ASC

  # Episode Sorting
  EPISODES_DESC
  EPISODES_ASC
  DURATION_DESC
  DURATION_ASC
  LATEST_EPISODE_DESC
  LATEST_EPISODE_ASC
  NEXT_EPISODE_DESC
  NEXT_EPISODE_ASC
  LAST_EPISODE_DESC
  LAST_EPISODE_ASC

  # Season Sorting
  SEASON_YEAR_DESC
  SEASON_YEAR_ASC

  # Format & Type
  FORMAT_ASC
  FORMAT_DESC
  TYPE_ASC
  TYPE_DESC

  # Status
  STATUS_ASC
  STATUS_DESC
}

enum MediaType {
  ANIME
  MANGA
}

enum MediaFormat {
  TV
  TV_SHORT
  MOVIE
  SPECIAL
  OVA
  ONA
  MUSIC
  MANGA
  NOVEL
