}

enum ExternalLinkType {
  INFO
  STREAMING
  SOCIAL
}

scalar CountryCode

type Anime {
  id: Int!
  id_mal: Int
  title: AnimeTitle
  poster: AnimePoster
  background: String
  synonyms: [String!]!
  description: String
  status: MediaStatus
  type: MediaType
  format: MediaFormat
  updated_at: Int!
  start_date: AnimeDate
  end_date: AnimeDate
  season: MediaSeason
  season_year: Int
  episodes_aired: Int
  episodes_total: Int
  duration: Int
  country: CountryCode
  is_licensed: Boolean
  source: MediaSource
  hashtag: String
  is_adult: Boolean
  score: Int
  popularity: Int
  trending: Int
  favorites: Int
  color: String
  franchise: String
  age_rating: String
  moreinfo: String
  broadcast: String
  nsfw: Boolean
  genres: [AnimeGenre!]!
  airing_schedule: [AiringSchedule!]!
  characters: [CharacterConnection!]!
  studios(only_main: Boolean): [StudioConnection!]!
  tags: [TagConnection!]!
  score_distribution: [ScoreDistribution!]!
  status_distribution: [StatusDistribution!]!
  links(type: String, label: String): [AnimeLink!]!
  other_titles(source: String, language: String): [OtherTitle!]!
  other_descriptions(source: String, language: String): [OtherDescription!]!
  images(source: String, type: String): [AnimeImage!]!
  videos(source: String, type: String): [AnimeVideo!]!
  screenshots(source: String, order_greater: Int, order_lesser: Int): [AnimeScreenshot!]!
  episodes(number_greater: Int, number_lesser: Int, air_date_greater: String, air_date_lesser: String): [Episode!]!
  artworks(iso_639_1: String, source: String, include_adult: Boolean, type: String): [AnimeArtwork!]!
  chronology: [Anime!]!
  recommendations: [Anime!]!
  connected: [Anime!]!
}

type AnimeTitle {
  romaji: String
  english: String
  native: String
}

type AnimePoster {
  small: String
  medium: String
  large: String
}

type AnimeDate {
  day: Int
  month: Int
  year: Int
}

type AnimeGenre {
  id: String!
  name: String!
}

type AiringSchedule {
  id: Int!
  episode: Int
  airing_at: Int
}

type CharacterPage {
  connections: [CharacterConnection!]!
  page_info: PageInfo!
}

type CharacterConnection {
  role: CharacterRole
  character: AnimeCharacter!
  voice_actors: [VoiceActor!]!
}

type AnimeCharacter {
  id: Int!
  age: String
  blood_type: String
  gender: String
  description: String
  name: CharacterName
  image: CharacterImage
  date_of_birth: AnimeDate
}

type CharacterName {
  first: String
  middle: String
  last: String
  full: String
  native: String
  alternative: [String!]!
  alternative_spoiler: [String!]!
}

type CharacterImage {
  large: String
  medium: String
}

type VoiceActor {
  id: Int!
  language: String
  age: Int
  blood_type: String
  gender: String
  description: String
  home_town: String
  name: VoiceActorName
  image: VoiceActorImage
  date_of_birth: AnimeDate
  date_of_death: AnimeDate
}

type VoiceActorName {
  first: String
  middle: String
  last: String
  full: String
  native: String
  alternative: [String!]!
}

type VoiceActorImage {
  large: String
  medium: String
}

type StudioConnection {
  is_main: Boolean
  studio: AnimeStudio!
}

type AnimeStudio {
  id: Int!
  name: String
}

type TagConnection {
  rank: Int
  is_spoiler: Boolean
  tag: AnimeTag!
}

type AnimeTag {
  id: Int!
  name: String
  description: String
  category: String
  is_adult: Boolean
}

type AnimeLink {
  link: String!
  label: String!
  type: String!
}

type ScoreDistribution {
  score: Int!
  amount: Int!
}

type StatusDistribution {
  status: String!
  amount: Int!
}

type OtherTitle {
  title: String!
  source: String!
  language: String!
}

type OtherDescription {
  description: String!
  source: String!
  language: String!
}

type AnimeImage {
  url: String!
  small: String
  medium: String
  large: String
  type: String!
  source: String!
}

type AnimeVideo {
  url: String!
  title: String
  thumbnail: String
  artist: String
  type: String
  source: String
}

type AnimeScreenshot {
  url: String!
  order: Int!
  small: String
  medium: String
  large: String
